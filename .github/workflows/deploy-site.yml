name: Deploy Full Site

on:
  workflow_dispatch:
    inputs:
      report_year:
        description: 'Report year'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::tidyr
            any::readr
            any::jsonlite
            any::here
            any::plotly
            any::quarto
            any::lubridate
            any::htmltools
            any::rvest
            any::knitr
            any::R6
            any::ggplot2
            any::kableExtra
            any::glue
          cache: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Remove freeze cache for full rebuild
        run: rm -rf website/_freeze

      - name: Render site
        run: quarto render website -P report_year:${{ github.event.inputs.report_year }}

      - name: Commit freeze cache
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'

          if [ -d "website/_freeze" ]; then
            git add website/_freeze

            if git diff --staged --quiet; then
              echo "No freeze cache changes to commit."
            else
              git commit -m 'update freeze cache'
              git push origin main
            fi
          else
            echo "No freeze cache found; skipping freeze cache commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4