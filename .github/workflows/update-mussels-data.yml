name: Update Mussel Data Files

on:
  repository_dispatch:
    types: [update-mussels]

permissions:
  contents: write

concurrency:
  group: update-mussel-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Save data to JSON
        env:
          DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          mkdir -p admin/test-data
          echo "$DATA" > admin/test-data/mussel_data.json

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::tidyr
            any::readr
            any::jsonlite
            any::here
            any::lubridate
          cache: true

      - name: Run data prep
        run: Rscript admin/setup_scripts/03_other_scripts/mussel-data-prep.R

      - name: Commit updated data files
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'

          git add \
            admin/test-data/mussel_data.json \
            admin/test-data/mussel_frames_data.rds

          if git diff --staged --quiet; then
            echo "No mussel data file changes to commit."
          else
            git commit -m 'update golden mussel data files'
            git push origin main
          fi