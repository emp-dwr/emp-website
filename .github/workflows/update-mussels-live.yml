name: Deploy Golden Mussel Live Update
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Mussel Data Files"]
    types: [completed]
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy-live:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Pull latest mussel data files from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            admin/test-data/mussel_data.json \
            admin/test-data/mussel_frames_data.rds
      - name: Debug - verify pulled data
        run: |
          echo "--- JSON file size ---"
          wc -c admin/test-data/mussel_data.json
          echo "--- Last entry in JSON ---"
          tail -c 500 admin/test-data/mussel_data.json
          echo "--- RDS file info ---"
          stat admin/test-data/mussel_frames_data.rds
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('qmd-files/website/special-studies/golden-mussels.qmd', 'admin/import_scripts.R') }}
          restore-keys: r-${{ runner.os }}-
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "dplyr",
            "tidyr",
            "readr",
            "jsonlite",
            "here",
            "plotly",
            "quarto",
            "lubridate",
            "htmltools"
          ))'
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Debug - verify here() and RDS contents
        run: |
          Rscript -e '
            cat("here() resolves to:", here::here(), "\n")
            data <- readRDS(here::here("admin/test-data/mussel_frames_data.rds"))
            cat("--- frames_data dimensions ---\n")
            cat(nrow(data$frames_data), "rows,", ncol(data$frames_data), "cols\n")
            cat("--- unique stations ---\n")
            cat(paste(sort(unique(data$frames_data$`Station Acronym`)), collapse=", "), "\n")
            cat("--- unique month_years ---\n")
            cat(paste(sort(unique(data$frames_data$month_year)), collapse=", "), "\n")
            cat("--- last few rows ---\n")
            print(tail(data$frames_data, 5))
          '
      - name: Render Golden Mussel page
        run: quarto render qmd-files/website/special-studies/golden-mussels.qmd
        
      - name: Render Golden Mussel page
        run: quarto render qmd-files/website/special-studies/golden-mussels.qmd

      - name: Move rendered output
            run: |
              mkdir -p output/website/qmd-files/website/special-studies
              cp qmd-files/website/special-studies/golden-mussels.html output/website/qmd-files/website/special-studies/
        
      - name: Debug - verify rendered output
        run: |
          echo "--- Output directory contents ---"
          ls -la output/website/special-studies/
          echo "--- HTML file size ---"
          wc -c output/website/special-studies/golden-mussels.html
          echo "--- Check for new data in HTML ---"
          grep -c "Apr 2026" output/website/special-studies/golden-mussels.html || echo "Apr 2026 not found in output"
          grep -c "RRI" output/website/special-studies/golden-mussels.html || echo "RRI not found in output"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4