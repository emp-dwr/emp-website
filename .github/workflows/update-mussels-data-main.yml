name: Update Mussel Data Files

on:
  repository_dispatch:
    types: [update-mussels]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Save data to JSON
        env:
          DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          echo "$DATA" > admin/test-data/mussel_data.json

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('admin/setup_scripts/03_other_scripts/mussel-data-prep.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "dplyr",
            "tidyr",
            "readr",
            "jsonlite",
            "here",
            "lubridate"
          ))'

      - name: Run data prep
        run: Rscript admin/setup_scripts/03_other_scripts/mussel-data-prep.R

      - name: Commit updated data files to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add \
            admin/test-data/mussel_data.json \
            admin/test-data/mussel_frames_data.rds
          git diff --staged --quiet || git commit -m "update golden mussel data files"
          git push origin HEAD:main