name: Update Mussel Data

on:
  repository_dispatch:
    types: [update-mussels]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
          
      - name: Save data to JSON
        env:
          DATA: ${{ toJson(github.event.client_payload.data) }}
        run: |
          echo "$DATA" > admin/test-data/mussel_data.json

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('admin/setup_scripts/03_other_scripts/mussel-data-prep.R', 'qmd-files/website/golden-mussels.qmd') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: Rscript -e 'install.packages(c("dplyr", "tidyr", "readr", "jsonlite", "here", "plotly", "quarto"))'

      - name: Run data prep
        run: Rscript admin/setup_scripts/03_other_scripts/mussel-data-prep.R

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render qmd-files/website/golden-mussels.qmd

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update mussel data and re-render site"
          git push