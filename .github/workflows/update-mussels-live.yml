name: Deploy Golden Mussel Live Update
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Mussel Data Files"]
    types: [completed]
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy-live:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Pull latest mussel data files from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            admin/test-data/mussel_data.json \
            admin/test-data/mussel_frames_data.rds
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "dplyr",
            "tidyr",
            "readr",
            "jsonlite",
            "here",
            "plotly",
            "quarto",
            "lubridate",
            "htmltools",
            "rvest"
          ))'
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render site
        run: quarto render
      - name: Commit freeze cache
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _freeze
          git diff --staged --quiet || git commit -m "update freeze cache"
          git push origin gh-pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4