name: Deploy Full Site

on:
  workflow_dispatch:
    inputs:
      report_year:
        description: 'Report year'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "dplyr",
            "tidyr",
            "readr",
            "jsonlite",
            "here",
            "plotly",
            "quarto",
            "lubridate",
            "htmltools",
            "rvest",
            "knitr",
            "R6",
            "ggplot2",
            "kableExtra",
            "glue"
          ))'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render qmd-files/website -P report_year:${{ github.event.inputs.report_year }}

      - name: Commit freeze cache
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'

          if [ -d "qmd-files/website/_freeze" ]; then
            git add qmd-files/website/_freeze
            git diff --staged --quiet || git commit -m 'update freeze cache'
            git push origin main
          else
            echo "No freeze cache found; skipping freeze cache commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website/_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4