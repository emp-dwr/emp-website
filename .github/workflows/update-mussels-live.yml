name: Deploy Golden Mussel Live Update

on:
  workflow_run:
    workflows: ["Update Mussel Data Files"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-live:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Pull latest mussel data files from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            admin/test-data/mussel_data.json \
            admin/test-data/mussel_frames_data.rds

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('qmd-files/website/special-studies/golden-mussels.qmd', 'admin/import_scripts.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "dplyr",
            "tidyr",
            "readr",
            "jsonlite",
            "here",
            "plotly",
            "quarto",
            "lubridate",
            "htmltools"
          ))'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Golden Mussel page
        run: quarto render qmd-files/website/special-studies/golden-mussels.qmd

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4